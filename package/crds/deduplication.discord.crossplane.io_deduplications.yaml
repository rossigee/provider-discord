---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: deduplications.deduplication.discord.crossplane.io
spec:
  group: deduplication.discord.crossplane.io
  names:
    categories:
    - crossplane
    - provider
    - discord
    kind: Deduplication
    listKind: DeduplicationList
    plural: deduplications
    singular: deduplication
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: PHASE
      type: string
    - jsonPath: .spec.mode
      name: MODE
      type: string
    - jsonPath: .status.summary.totalDuplicateChannelsFound
      name: DUPLICATES-FOUND
      type: integer
    - jsonPath: .status.summary.channelsDeleted
      name: DELETED
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: A Deduplication tracks a channel deduplication operation.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: A DeduplicationSpec defines the desired state of a Deduplication
              operation.
            properties:
              deleteOrphanedResources:
                description: |-
                  DeleteOrphanedResources indicates whether to delete Crossplane resources
                  for deleted Discord channels.
                type: boolean
              mode:
                description: Mode defines the deduplication behavior that was requested.
                enum:
                - report
                - action
                type: string
              providerConfigRef:
                description: ProviderConfigRef references the ProviderConfig that
                  triggered this deduplication.
                properties:
                  name:
                    description: Name of the ProviderConfig.
                    type: string
                required:
                - name
                type: object
              targetGuilds:
                description: |-
                  TargetGuilds limits deduplication to specific guild IDs.
                  If empty, all guilds were processed.
                items:
                  type: string
                type: array
            required:
            - mode
            - providerConfigRef
            type: object
          status:
            description: A DeduplicationStatus reflects the observed state of a Deduplication
              operation.
            properties:
              completionTime:
                description: CompletionTime is when the deduplication operation completed.
                format: date-time
                type: string
              conditions:
                description: Conditions represent the latest available observations
                  of the deduplication's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastError:
                description: LastError describes the last error encountered during
                  deduplication (if any).
                type: string
              phase:
                description: Phase indicates the current phase of the deduplication
                  operation.
                enum:
                - pending
                - analyzing
                - completed
                - failed
                type: string
              results:
                additionalProperties:
                  description: GuildDeduplicationResult contains deduplication results
                    for a specific guild.
                  properties:
                    channelsDeleted:
                      description: ChannelsDeleted is the count of channels deleted
                        in this guild (action mode only).
                      type: integer
                    duplicateGroups:
                      description: DuplicateGroups contains information about each
                        duplicate group found.
                      items:
                        description: DuplicateGroupInfo contains information about
                          a group of duplicate channels.
                        properties:
                          channelName:
                            description: ChannelName is the name shared by all channels
                              in this group.
                            type: string
                          count:
                            description: Count is the number of duplicate channels
                              with this name.
                            type: integer
                          deletedChannelIds:
                            description: DeletedChannelIDs are the IDs of channels
                              that were deleted.
                            items:
                              type: string
                            type: array
                          keptChannelId:
                            description: KeptChannelID is the ID of the channel that
                              was kept.
                            type: string
                        required:
                        - channelName
                        - count
                        type: object
                      type: array
                    errors:
                      description: Errors contains any errors encountered while processing
                        this guild.
                      items:
                        type: string
                      type: array
                    guildId:
                      description: GuildID is the Discord guild ID.
                      type: string
                    guildName:
                      description: GuildName is the Discord guild name.
                      type: string
                    orphanedResourcesDeleted:
                      description: OrphanedResourcesDeleted is the count of resources
                        deleted in this guild (action mode only).
                      type: integer
                    totalChannels:
                      description: TotalChannels is the total number of channels in
                        the guild.
                      type: integer
                  required:
                  - channelsDeleted
                  - guildId
                  - guildName
                  - orphanedResourcesDeleted
                  - totalChannels
                  type: object
                description: Results contains per-guild deduplication results.
                type: object
              startTime:
                description: StartTime is when the deduplication operation was initiated.
                format: date-time
                type: string
              summary:
                description: Summary provides aggregate statistics about the deduplication
                  operation.
                properties:
                  channelsDeleted:
                    description: ChannelsDeleted is the count of Discord channels
                      actually deleted (action mode only).
                    type: integer
                  duplicateGroupsFound:
                    description: DuplicateGroupsFound is the number of distinct duplicate
                      channel groups.
                    type: integer
                  orphanedResourcesDeleted:
                    description: OrphanedResourcesDeleted is the count of Crossplane
                      resources deleted (action mode only).
                    type: integer
                  totalChannelsAnalyzed:
                    description: TotalChannelsAnalyzed is the total number of channels
                      examined.
                    type: integer
                  totalDuplicateChannelsFound:
                    description: TotalDuplicateChannelsFound is the total count of
                      duplicate channels (excluding the kept one in each group).
                    type: integer
                  totalGuildsAnalyzed:
                    description: TotalGuildsAnalyzed is the number of guilds that
                      were analyzed.
                    type: integer
                required:
                - channelsDeleted
                - duplicateGroupsFound
                - orphanedResourcesDeleted
                - totalChannelsAnalyzed
                - totalDuplicateChannelsFound
                - totalGuildsAnalyzed
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
